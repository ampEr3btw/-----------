{% extends 'base.html' %}
{% block title %}Вход / Регистрация{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h1 class="h4 mb-4 text-center">Аккаунт</h1>
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <ul class="nav nav-pills nav-fill mb-3" role="tablist">
                    <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#tab-login" type="button">Вход</button></li>
                    <li class="nav-item"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#tab-reg" type="button">Регистрация</button></li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="tab-login">
                        <form method="post" action="{{ url_for('login') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <input type="hidden" name="next" value="{{ next }}">
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required autocomplete="username">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control" required autocomplete="current-password">
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Войти</button>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="tab-reg">
                        <form method="post" action="{{ url_for('register') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                            <input type="hidden" name="next" value="{{ next }}">
                            <div class="row g-2">
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">Фамилия</label>
                                    <input type="text" name="last_name" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-2">
                                    <label class="form-label">Имя</label>
                                    <input type="text" name="first_name" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Отчество</label>
                                <input type="text" name="middle_name" class="form-control">
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Телефон</label>
                                <input type="tel" name="phone" class="form-control" required>
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Email</label>
                                <input type="email" name="email" class="form-control" required autocomplete="email">
                            </div>
                            <div class="mb-2">
                                <label class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control" required autocomplete="new-password">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Повтор пароля</label>
                                <input type="password" name="confirm_password" class="form-control" required autocomplete="new-password">
                            </div>
                            <button type="submit" class="btn btn-dark w-100">Зарегистрироваться</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
