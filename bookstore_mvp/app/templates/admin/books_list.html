{% extends "admin/base_admin.html" %}
{% block title %}Книги{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4">Книги</h1>
    <a class="btn btn-dark btn-sm" href="/admin/books/new">Добавить</a>
</div>
<form method="get" action="/admin/books" class="row g-2 mb-3">
    <div class="col-md-5">
        <input class="form-control" name="q" value="{{ search_query or '' }}" placeholder="Поиск по названию или ISBN">
    </div>
    <div class="col-md-3">
        <select class="form-select" name="sort">
            <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>Сначала новые</option>
            <option value="title_asc" {% if current_sort == 'title_asc' %}selected{% endif %}>Название А-Я</option>
            <option value="title_desc" {% if current_sort == 'title_desc' %}selected{% endif %}>Название Я-А</option>
            <option value="price_asc" {% if current_sort == 'price_asc' %}selected{% endif %}>Цена ↑</option>
            <option value="price_desc" {% if current_sort == 'price_desc' %}selected{% endif %}>Цена ↓</option>
            <option value="stock_asc" {% if current_sort == 'stock_asc' %}selected{% endif %}>Остаток ↑</option>
            <option value="stock_desc" {% if current_sort == 'stock_desc' %}selected{% endif %}>Остаток ↓</option>
        </select>
    </div>
    <div class="col-auto">
        <button class="btn btn-outline-secondary" type="submit">Найти</button>
    </div>
    {% if search_query %}
    <div class="col-auto">
        <a class="btn btn-outline-dark" href="/admin/books">Сброс</a>
    </div>
    {% endif %}
</form>
<table class="table table-striped bg-white shadow-sm">
    <thead><tr><th>ID</th><th>Название</th><th>ISBN</th><th>Цена</th><th>Остаток</th><th></th></tr></thead>
    <tbody>
        {% for b in books %}
        <tr>
            <td>{{ b.id }}</td>
            <td><a href="/admin/books/{{ b.id }}/edit">{{ b.title }}</a></td>
            <td>{{ b.isbn }}</td>
            <td>{{ b.price }}</td>
            <td>{{ b.quantity }}</td>
            <td>
                <form method="post" action="/admin/books/{{ b.id }}/delete" class="d-inline" onsubmit="return confirm('Удалить?');">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
