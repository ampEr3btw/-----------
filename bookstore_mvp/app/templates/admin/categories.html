{% extends "admin/base_admin.html" %}
{% block title %}Категории{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Категории</h1>
<form method="get" action="/admin/categories" class="row g-2 mb-3">
    <div class="col-md-5">
        <input class="form-control" name="q" value="{{ search_query or '' }}" placeholder="Поиск по названию категории">
    </div>
    <div class="col-md-3">
        <select class="form-select" name="sort">
            <option value="name_asc" {% if current_sort == 'name_asc' %}selected{% endif %}>Название А-Я</option>
            <option value="name_desc" {% if current_sort == 'name_desc' %}selected{% endif %}>Название Я-А</option>
            <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>Сначала новые</option>
            <option value="oldest" {% if current_sort == 'oldest' %}selected{% endif %}>Сначала старые</option>
        </select>
    </div>
    <div class="col-auto">
        <button class="btn btn-outline-secondary" type="submit">Найти</button>
    </div>
    {% if search_query %}
    <div class="col-auto">
        <a class="btn btn-outline-dark" href="/admin/categories">Сброс</a>
    </div>
    {% endif %}
</form>
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <form method="post" action="/admin/categories/save" class="row g-2 align-items-end">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="col-md-3"><label class="form-label">ID (для правки)</label><input class="form-control" name="category_id" placeholder="пусто = новая"></div>
            <div class="col-md-4"><label class="form-label">Название</label><input class="form-control" name="name" required></div>
            <div class="col-md-2"><button class="btn btn-dark" type="submit">Сохранить</button></div>
        </form>
    </div>
</div>
<table class="table bg-white shadow-sm">
    <thead><tr><th>ID</th><th>Название</th><th></th></tr></thead>
    <tbody>
        {% for c in categories %}
        <tr>
            <td>{{ c.id }}</td>
            <td>{{ c.name }}</td>
            <td>
                <form method="post" action="/admin/categories/{{ c.id }}/delete" class="d-inline" onsubmit="return confirm('Удалить?');">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
