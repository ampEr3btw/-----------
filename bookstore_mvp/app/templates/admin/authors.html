{% extends "admin/base_admin.html" %}
{% block title %}Авторы{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Авторы</h1>
<form method="get" action="/admin/authors" class="row g-2 mb-3">
    <div class="col-md-5">
        <input class="form-control" name="q" value="{{ search_query or '' }}" placeholder="Поиск по ФИО автора">
    </div>
    <div class="col-md-3">
        <select class="form-select" name="sort">
            <option value="name_asc" {% if current_sort == 'name_asc' %}selected{% endif %}>Фамилия А-Я</option>
            <option value="name_desc" {% if current_sort == 'name_desc' %}selected{% endif %}>Фамилия Я-А</option>
            <option value="newest" {% if current_sort == 'newest' %}selected{% endif %}>Сначала новые</option>
            <option value="oldest" {% if current_sort == 'oldest' %}selected{% endif %}>Сначала старые</option>
        </select>
    </div>
    <div class="col-auto">
        <button class="btn btn-outline-secondary" type="submit">Найти</button>
    </div>
    {% if search_query %}
    <div class="col-auto">
        <a class="btn btn-outline-dark" href="/admin/authors">Сброс</a>
    </div>
    {% endif %}
</form>
<div class="card shadow-sm mb-4">
    <div class="card-body">
        <h2 class="h6">Новый / редактирование</h2>
        <form method="post" action="/admin/authors/save" class="row g-2 align-items-end">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="col-md-2"><label class="form-label">ID (для правки)</label><input class="form-control" name="author_id" placeholder="пусто = новый"></div>
            <div class="col-md-2"><label class="form-label">Фамилия</label><input class="form-control" name="last_name" required></div>
            <div class="col-md-2"><label class="form-label">Имя</label><input class="form-control" name="first_name" required></div>
            <div class="col-md-2"><label class="form-label">Отчество</label><input class="form-control" name="middle_name"></div>
            <div class="col-md-2"><button class="btn btn-dark" type="submit">Сохранить</button></div>
        </form>
    </div>
</div>
<table class="table bg-white shadow-sm">
    <thead><tr><th>ID</th><th>ФИО</th><th></th></tr></thead>
    <tbody>
        {% for a in authors %}
        <tr>
            <td>{{ a.id }}</td>
            <td>{{ author_display_name(a) }}</td>
            <td>
                <form method="post" action="/admin/authors/{{ a.id }}/delete" class="d-inline" onsubmit="return confirm('Удалить?');">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
