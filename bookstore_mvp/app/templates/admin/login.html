<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Админ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>
<body class="bg-light">
<div class="container py-5" style="max-width:420px">
    <h1 class="h4 mb-4">Вход сотрудника</h1>
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <form method="post" action="/admin/login" class="card shadow-sm">
        <div class="card-body">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mb-3"><label class="form-label">Логин</label><input name="login" class="form-control" required autocomplete="username"></div>
            <div class="mb-3"><label class="form-label">Пароль</label><input type="password" name="password" class="form-control" required autocomplete="current-password"></div>
            <button class="btn btn-dark w-100" type="submit">Войти</button>
        </div>
    </form>
    <p class="mt-3 small"><a href="/">На сайт</a></p>
</div>
</body>
</html>
